<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equip shop|Hamz swim school</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Abstract Background Blobs for Glass Effect -->
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="main-wrapper">
     <nav class="navbar glass-panel">
        <div class="logo"> <img src="imgs/SWIM.png" alt="hamz logo" style="max-height: 40px;" >Hamz swim school</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a> </li>
            <li><a href="shop.html" class="active">Shop</a> </li>
            <li><a href="services.html">Services</a> </li>
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </ul>
    </nav>

    <section class="shop-section">
        <div class="container" style="padding: 100px 5% 50px;">
            <h1 style="text-align: center; font-size: 3rem; margin-bottom: 10px; font-weight: 800;">Swim gear</h1>
            <p style="text-align: center; font-size: 1.2rem; color: var(--light-gray); margin-bottom: 40px;">Quality gear selected.</p>
            <div class="product-grid" id="product-list">
                <div class="product-card glass-panel">
                    <img src="imgs/goggles_blue.jpg" alt="swim googles">
                    <div class="product-info">
                        <h3>ZOKE SWIM GOGGLES</h3>
                        <p class="price">UGX 150,000</p>
                         <a href="http://wa.me/256708009153?text=I%20want%20to%20to%20buy%20the%20Anti-fog%20Googles" 
                         class="btn-shop" >Order on whatsapp</a>
                    </div>
                </div>

                <div class="product-card glass-panel">
                    <img src="imgs/paddles_orange.jpg" alt="swim paddles">
                    <div class="product-info">
                        <h3>Paddles</h3>
                        <p class="price">UGX 80,000</p>
                         <a href="http://wa.me/256708009153?text=I%20want%20to%20to%20buy%20the%20swim%20paddles" 
                         class="btn-shop" >Order on whatsapp</a>
                    </div>
                </div>

                <div class="product-card glass-panel">
                    <img src="imgs/shirt_blue.jpg" alt="Hamz club shirts">
                    <div class="product-info">
                        <h3>Shirt</h3>
                        <p class="price">UGX 30,000</p>
                         <a href="http://wa.me/256708009153?text=I%20want%20to%20to%20buy%20the%20Hamz_swim school%20shirt" 
                         class="btn-shop" >Order on whatsapp</a>
                    </div>
                </div>

                <div class="product-card glass-panel">
                    <img src="imgs/stickers.jpg" alt="swim googles">
                    <div class="product-info">
                        <h3>stickers</h3>
                        <p class="price">UGX 3,000</p>
                         <a href="http://wa.me/256708009153?text=I%20want%20to%20to%20buy%20the%20Hamz_swim%20stickers" 
                         class="btn-shop" >Order on whatsapp</a>
                    </div>
                </div>

                <div class="product-card glass-panel">
                    <img src="imgs/coach hamz.jpg" alt="swim googles">
                    <div class="product-info">
                        <h3> Jumper</h3>
                        <p class="price">UGX 50,000</p>
                         <a href="http://wa.me/256708009153?text=I%20want%20to%20to%20buy%20the%20Anti-fog%20Googles" 
                         class="btn-shop" >Order on whatsapp</a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <a href="http://wa.me/256708009153" class="whatsapp-float" target="_blank">
        <img src="imgs/whatsapp-128-svgrepo-com.svg" alt="Whatsapp">
    </a>
    <div class="marquee-fixed">
        <div class="marquee-content" id="marquee-text">
            <span>&nbsp;</span>
        </div>
    </div>
   </div> <!-- End main-wrapper -->
   <script type="module" src="js/main.js"></script> 
</body>
</html>
